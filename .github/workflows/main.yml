name: Update News and Analyze

on:
  schedule:
    # Körs varje natt kl 00:00 UTC (ca kl 02:00 svensk tid)
    - cron: '0 0 * * *'
  workflow_dispatch: # Gör att du kan starta den manuellt med en knapp!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          # Här kopplar vi ihop GitHubs Secrets med din kod
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python fetch_and_analyze.py